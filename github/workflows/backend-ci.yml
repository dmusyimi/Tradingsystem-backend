name: TradingSystem Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: built

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # 3️⃣ Make gradlew executable
      - name: Grant execute permission
        run: chmod +x gradlew

      # 4️⃣ Clean & Build
      - name: Build with Gradle
        run: ./gradlew clean build

      # 5️⃣ Create built folder & copy jar
      - name: Prepare Artifact
        run: |
          mkdir -p $BUILD_DIR
          cp build/libs/*.jar $BUILD_DIR/

      # 6️⃣ Upload artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tradingsystem-backend-jar
          path: built/*.jar