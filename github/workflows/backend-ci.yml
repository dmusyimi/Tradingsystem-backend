name: TradingSystem Backend CI (Maven)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: built

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Java 17
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3️⃣ Build and run tests
      - name: Build with Maven
        run: mvn clean package

      # 4️⃣ Create built directory and copy JAR
      - name: Prepare Artifact
        run: |
          mkdir -p $BUILD_DIR
          cp target/*.jar $BUILD_DIR/

      # 5️⃣ Upload JAR artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tradingsystem-backend-jar
          path: built/*.jar