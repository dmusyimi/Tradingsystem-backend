spring.application.name=tradingsystem
# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration - MySQL
spring.datasource.url=jdbc:mysql://172.17.0.1:3306/tradingsystem?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=tradingsystem_user
spring.datasource.password=Musyimi254#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration<
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=60000

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Disable SQL script initialization (data already exists)
spring.sql.init.mode=never

# Jakarta EE Configuration
spring.jpa.properties.jakarta.persistence.provider=org.hibernate.jpa.HibernatePersistenceProvider

# Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.wholesale.tradingsystem=DEBUG

# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC

# Security (if implemented later)
# security.basic.enabled=false